services:
  # PostgreSQL Database
  - type: pserv
    name: fastapi-db
    plan: starter
    region: oregon
    databaseName: fastapi_db
    databaseUser: fastapi_user
    ipAllowList: []

  # FastAPI Web Service
  - type: web
    name: fastapi-app
    runtime: python
    region: oregon
    plan: starter
    branch: main
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      
      - key: DATABASE_HOSTNAME
        fromDatabase:
          name: fastapi-db
          property: host
      
      - key: DATABASE_PORT
        fromDatabase:
          name: fastapi-db
          property: port
      
      - key: DATABASE_NAME
        fromDatabase:
          name: fastapi-db
          property: database
      
      - key: DATABASE_USERNAME
        fromDatabase:
          name: fastapi-db
          property: user
      
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: fastapi-db
          property: password
      
      - key: SECRET_KEY
        generateValue: true
      
      - key: ALGORITHM
        value: HS256
      
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
